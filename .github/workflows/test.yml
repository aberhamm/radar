name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_BASE_URL: http://localhost:3000

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd dashboard && pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml', 'dashboard/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd dashboard && npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd dashboard && npx playwright install-deps chromium

      - name: Build
        run: pnpm build

      - name: Typecheck dashboard
        run: cd dashboard && npx tsc --noEmit

      - name: Unit tests
        if: success()
        run: pnpm test:unit

      - name: API integration tests
        if: success()
        run: pnpm test:integration

      - name: Playwright E2E tests
        if: success()
        run: cd dashboard && npx playwright test --project=chromium

      - name: Visual regression tests
        if: success()
        run: cd dashboard && npx playwright test tests/e2e/visual-regression.spec.ts --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: dashboard/test-results/
          retention-days: 7
